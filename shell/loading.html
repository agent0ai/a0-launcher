<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data:">
    <title>A0 Launcher</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            width: 100%;
            height: 100%;
            background: transparent;
            overflow: hidden;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: transparent;
            color: #f4f6fb;
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            -webkit-app-region: drag;
            user-select: none;
        }
        .container {
            text-align: center;
            transform-origin: center;
            animation: splash-open 1.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        .logo {
            width: 132px;
            height: 132px;
            margin-bottom: 0;
            border-radius: 30px;
            filter: drop-shadow(0 16px 28px rgba(0, 0, 0, 0.32));
        }
        @keyframes splash-open {
            0% { transform: scale(0.78); opacity: 0; }
            45% { opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes splash-close {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.22); opacity: 0; }
        }
        body.is-opening-app .container {
            animation: splash-close 180ms cubic-bezier(0.2, 0, 0.18, 1) both;
        }
        .status {
            font-size: 14px;
            color: rgba(255,255,255,0.72);
            display: none;
            margin: 12px 0 0;
            text-shadow: 0 2px 14px rgba(0, 0, 0, 0.45);
        }
        .spinner {
            display: none;
        }
        .error {
            color: #ff6b6b;
            display: none;
            max-width: 300px;
            margin-top: 12px;
            font-size: 13px;
            line-height: 1.35;
            text-shadow: 0 2px 14px rgba(0, 0, 0, 0.45);
        }
        .error.visible {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <img class="logo" src="assets/icon.png" alt="A0 Launcher" onerror="this.style.display='none'">
        <p class="status" id="status">Checking for updates...</p>
        <div class="spinner" id="spinner"></div>
        <p class="error" id="error"></p>
    </div>
    <script>
        window.electronAPI?.onStatusUpdate?.((status) => {
            document.getElementById('status').textContent = status;
        });
        window.electronAPI?.onError?.((error) => {
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('error').textContent = error;
            document.getElementById('error').classList.add('visible');
        });
        window.electronAPI?.onLauncherOpeningApp?.(() => {
            document.body.classList.add('is-opening-app');
        });
    </script>
</body>
</html>
