<body>
  <section class="section sv-card">
    <div class="sv-card-head">
      <h2 class="section-title sv-section-heading">Port Preferences</h2>
      <div class="sv-subtitle">Configure UI and SSH port mappings</div>
    </div>
    <div class="sv-settings-grid">
      <div class="sv-settings-row">
        <label class="sv-settings-label" for="uiPortInput">UI Port</label>
        <div class="sv-settings-field">
          <input id="uiPortInput" class="sv-input" type="number" min="1024" max="65535" placeholder="e.g. 8080">
          <span class="sv-settings-hint">Port for the Agent Zero web UI</span>
        </div>
      </div>
      <div class="sv-settings-row">
        <label class="sv-settings-label" for="sshPortInput">SSH Port</label>
        <div class="sv-settings-field">
          <input id="sshPortInput" class="sv-input" type="number" min="1024" max="65535" placeholder="e.g. 2222">
          <span class="sv-settings-hint">Port for SSH access inside the container</span>
        </div>
      </div>
    </div>
    <div class="sv-row-end" style="margin-top:0.75rem;">
      <button id="savePortsBtn" class="button confirm" type="button">Save Ports</button>
    </div>
  </section>

  <section class="section sv-card">
    <div class="sv-card-head">
      <h2 class="section-title sv-section-heading">Retention Policy</h2>
      <div class="sv-subtitle">How many stopped sessions to keep before pruning</div>
    </div>
    <div class="sv-settings-grid">
      <div class="sv-settings-row">
        <label class="sv-settings-label" for="keepCountSelect">Keep sessions</label>
        <div class="sv-settings-field">
          <select id="keepCountSelect" class="sv-select">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="5">5</option>
            <option value="10">10</option>
            <option value="20">20</option>
          </select>
          <span class="sv-settings-hint">Older sessions beyond this count will be removed automatically</span>
        </div>
      </div>
    </div>
    <div class="sv-row-end" style="margin-top:0.75rem;">
      <button id="saveRetentionBtn" class="button confirm" type="button">Save Policy</button>
    </div>
  </section>

  <script type="module" src="components/docker-manager/settings/settings.js"></script>
</body>
